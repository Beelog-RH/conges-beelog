// ─── Jours fériés France (calcul automatique) ─────────────────────────────────
// fmt local : évite le décalage UTC de toISOString()
function fmtLocal(year, month, day) {
  return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

function getPaques(year) {
  // Algorithme de Meeus/Jones/Butcher — retourne {month (1-based), day}
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31); // 1-based
  const day   = ((h + l - 7 * m + 114) % 31) + 1;
  return { year, month, day }; // month est 1-based
}

// Ajoute n jours à une date {year,month,day} et retourne une string YYYY-MM-DD
function addDays({ year, month, day }, n) {
  const d = new Date(year, month - 1, day + n); // month-1 car Date() attend 0-based
  return fmtLocal(d.getFullYear(), d.getMonth() + 1, d.getDate());
}

function getFeriesAuto(year) {
  const paques = getPaques(year);
  return {
    [fmtLocal(year,  1,  1)]:      "Jour de l'An",
    [addDays(paques, 1)]:          "Lundi de Pâques",
    [fmtLocal(year,  5,  1)]:      "Fête du Travail",
    [fmtLocal(year,  5,  8)]:      "Victoire 1945",
    [addDays(paques, 39)]:         "Ascension",
    [addDays(paques, 50)]:         "Lundi de Pentecôte",
    [fmtLocal(year,  7, 14)]:      "Fête Nationale",
    [fmtLocal(year,  8, 15)]:      "Assomption",
    [fmtLocal(year, 11,  1)]:      "Toussaint",
    [fmtLocal(year, 11, 11)]:      "Armistice",
    [fmtLocal(year, 12, 25)]:      "Noël",
  };
}

// Vérifie les dates calculées pour une année (pour affichage de débogage)
function verifyFeries(year) {
  const f = getFeriesAuto(year);
  return Object.entries(f).sort((a,b)=>a[0].localeCompare(b[0]));
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function joursOuvres(debut, fin, feriesMap = {}) {
  let c = 0; const d = new Date(debut), f = new Date(fin);
  while (d <= f) {
    const day = d.getDay(); const ds = d.toISOString().split("T")[0];
    if (day !== 0 && day !== 6 && !feriesMap[ds]) c++;
    d.setDate(d.getDate() + 1);
  }
  return c;
}

function dateInRange(dateStr, debut, fin) {
  return dateStr >= debut && dateStr <= fin;
}

function getDaysInMonth(year, month) {
  const days = [];
  const d = new Date(year, month, 1);
  while (d.getMonth() === month) { days.push(new Date(d)); d.setDate(d.getDate() + 1); }
  return days;
}

function exportCSV(data, filename) {
  const csv = data.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob); const a = document.createElement("a");
  a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
}

// ─── Change Password ──────────────────────────────────────────────────────────
function ChangePasswordScreen({ onDone }) {
  const [form, setForm] = useState({ pwd:"", pwd2:"" });
  const [err, setErr] = useState("");
  const submit = () => {
    if (form.pwd.length < 6) return setErr("Au moins 6 caractères requis.");
    if (form.pwd !== form.pwd2) return setErr("Les mots de passe ne correspondent pas.");
    onDone(form.pwd);
  };
  return (
    <div className="changepwd-wrap">
      <div className="changepwd-card">
        <div style={{fontSize:34,marginBottom:10}}>🔐</div>
        <h2>Changement de mot de passe requis</h2>
        <p>Votre compte a été créé avec un mot de passe temporaire. Définissez un mot de passe personnel pour continuer.</p>
        {err && <div className="info-box info-warn" style={{marginBottom:12}}>{err}</div>}
        <div className="field"><label>Nouveau mot de passe</label>
          <input type="password" placeholder="Au moins 6 caractères" value={form.pwd} onChange={e=>setForm({...form,pwd:e.target.value})} /></div>
        <div className="field"><label>Confirmer</label>
          <input type="password" placeholder="Répétez" value={form.pwd2} onChange={e=>setForm({...form,pwd2:e.target.value})} onKeyDown={e=>e.key==="Enter"&&submit()} /></div>
        <button className="btn btn-primary btn-full" onClick={submit}>Valider et accéder →</button>
      </div>
    </div>
  );
}

// ─── Login ────────────────────────────────────────────────────────────────────
function LoginScreen({ users, onLogin }) {
  const [email, setEmail] = useState(""); const [pwd, setPwd] = useState(""); const [err, setErr] = useState("");
  const submit = () => {
    const u = users.find(u=>u.email===email&&u.password===pwd);
    u ? onLogin(u) : setErr("Email ou mot de passe incorrect.");
  };
  const admins = users.filter(u=>u.isAdmin);
  const managers = users.filter(u=>u.role==="manager"&&!u.isAdmin);
  const salaries = users.filter(u=>u.role==="salarie").slice(0,2);
  return (
    <div className="login-wrap">
      <div className="login-brand">
        <div className="login-brand-icon">🌴</div>
        <h1>Gestion des congés Beelog</h1>
        <p>Gestion des congés et absences</p>

      </div>
      <div className="login-form-side">
        <div className="login-card">
          <h2>Connexion</h2>
          <p>Accédez à votre espace</p>
          <div className="field"><label>Email</label>
            <input type="email" value={email} placeholder="vous@entreprise.fr" onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} /></div>
          <div className="field"><label>Mot de passe</label>
            <input type="password" value={pwd} placeholder="••••••••" onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} /></div>
          {err && <div className="error-msg">⚠ {err}</div>}
          <button className="btn btn-primary btn-full" onClick={submit}>Se connecter →</button>
        </div>

  );
}

// ─── Planning Mensuel ─────────────────────────────────────────────────────────
function Planning({ users, demandes, absences, feriesAll }) {
  const now = new Date();
  const [mois, setMois] = useState(now.getMonth());
  const [annee, setAnnee] = useState(now.getFullYear());

  const days = getDaysInMonth(annee, mois);
  const salaries = users.filter(u=>u.role==="salarie");

  const prevMonth = () => { if (mois===0){setMois(11);setAnnee(a=>a-1);}else setMois(m=>m-1); };
  const nextMonth = () => { if (mois===11){setMois(0);setAnnee(a=>a+1);}else setMois(m=>m+1); };

  // Calcule le type de journée pour un salarié/date
  // Retourne { type, statut } — statut peut être "approuve" ou "en_attente"
  const getDayInfo = (uid, dateStr) => {
    // Congé approuvé
    const congeOk = demandes.find(d=>d.salarieId===uid&&d.statut==="approuve"&&dateStr>=d.debut&&dateStr<=d.fin);
    if (congeOk) return { type: congeOk.type==="RTT" ? "rtt" : "conge", statut: "approuve" };
    // Congé en attente (projeté)
    const congeWait = demandes.find(d=>d.salarieId===uid&&d.statut==="en_attente"&&dateStr>=d.debut&&dateStr<=d.fin);
    if (congeWait) return { type: congeWait.type==="RTT" ? "rtt" : "conge", statut: "en_attente" };
    // Absence
    const abs = absences.find(a=>a.salarieId===uid&&dateStr>=a.debut&&dateStr<=a.fin);
    if (abs) return { type: abs.type, statut: "approuve" };
    return null;
  };

  const getCellClass = (info, isWeekend, isFerie) => {
    if (isFerie) return "day-ferie";
    if (isWeekend) return "day-weekend";
    if (!info) return "day-travaille";
    if (info.statut==="en_attente") return info.type==="rtt" ? "day-rtt-attente" : "day-conge-attente";
    if (info.type==="conge") return "day-conge";
    if (info.type==="rtt") return "day-rtt";
    return `day-${info.type}`;
  };

  const getCellLabel = (info, isFerie, isWeekend) => {
    if (isFerie) return "F";
    if (isWeekend || !info) return "";
    if (info.statut==="en_attente") return info.type==="rtt" ? "?" : "?";
    if (info.type==="conge") return "CP";
    if (info.type==="rtt") return "RTT";
    const t = ABSENCE_TYPES.find(x=>x.id===info.type);
    return t ? t.label.split(" ")[0].substring(0,3).toUpperCase() : "";
  };

  return <>
    <div className="page-header">
      <div><div className="page-title">Planning équipe 📅</div><div className="page-sub">Vue mensuelle de présence / absence</div></div>
      <div className="actions-row">
        <button className="month-nav-btn" onClick={prevMonth}>◀</button>
        <strong style={{fontSize:15,minWidth:140,textAlign:"center"}}>{MONTHS[mois]} {annee}</strong>
        <button className="month-nav-btn" onClick={nextMonth}>▶</button>
      </div>
    </div>
    <div className="page-body">
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div className="planning-wrap">
          <table className="planning-table">
            <thead>
              <tr>
                <th style={{textAlign:"left",paddingLeft:10,minWidth:140,position:"sticky",left:0,background:"var(--cream)",zIndex:3}}>Salarié</th>
                {days.map(d=>{
                  const ds = d.toISOString().split("T")[0];
                  const isWE = d.getDay()===0||d.getDay()===6;
                  const isFerie = !!feriesAll[ds];
                  const title = isFerie ? feriesAll[ds] : "";
                  return <th key={ds} className={`day-header${isWE?" weekend":""}${isFerie?" ferie":""}`} title={title}>
                    <div style={{fontSize:9,color:"var(--muted)"}}>{DAYS_SHORT[(d.getDay()+6)%7]}</div>
                    <div>{d.getDate()}</div>
                  </th>;
                })}
              </tr>
            </thead>
            <tbody>
              {salaries.map(sal=>(
                <tr key={sal.id}>
                  <td className="name-cell">{sal.nom}</td>
                  {days.map(d=>{
                    const ds = d.toISOString().split("T")[0];
                    const isWE = d.getDay()===0||d.getDay()===6;
                    const isFerie = !!feriesAll[ds];
                    const info = isWE||isFerie ? null : getDayInfo(sal.id, ds);
                    const cls = getCellClass(info, isWE, isFerie);
                    const lbl = getCellLabel(info, isFerie, isWE);
                    const titleTxt = isFerie ? feriesAll[ds]
                      : info ? (info.statut==="en_attente" ? "⏳ En attente de validation" : (ABSENCE_TYPES.find(x=>x.id===info.type)?.label || (info.type==="conge"?"Congés payés":"RTT")))
                      : "";
                    return <td key={ds} title={titleTxt}>
                      <div className={`day-cell ${cls}`} style={{fontSize:8}}>{lbl}</div>
                    </td>;
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="legend">
        <strong style={{fontSize:11,color:"var(--muted)"}}>Légende :</strong>
        {[
          {label:"Congés payés",col:"#10b981"},
          {label:"RTT",col:"#7c3aed"},
          {label:"Jour férié",col:"#fde8d8",border:"#f59e0b"},
          {label:"Weekend",col:"#f0ece4",border:"#d4cfc6"},
          ...ABSENCE_TYPES.map(t=>({label:t.label,col:t.planningColor})),
        ].map(l=>(
          <div className="legend-item" key={l.label}>
            <div className="legend-dot" style={{background:l.col,border:l.border?`1px solid ${l.border}`:undefined}}></div>
            {l.label}
          </div>
        ))}
        {/* Entrées spéciales pour les en attente */}
        <div className="legend-item">
          <div className="legend-dot" style={{background:"repeating-linear-gradient(45deg,#10b981,#10b981 3px,#d1fae5 3px,#d1fae5 7px)"}}></div>
          CP en attente
        </div>
        <div className="legend-item">
          <div className="legend-dot" style={{background:"repeating-linear-gradient(45deg,#7c3aed,#7c3aed 3px,#ede9fe 3px,#ede9fe 7px)"}}></div>
          RTT en attente
        </div>
      </div>
      <div className="info-box info-yellow" style={{marginTop:12}}>
        ⏳ Les cases <strong>hachurées</strong> indiquent des congés demandés mais <strong>pas encore validés</strong>. Survolez une case pour voir son statut.
      </div>
    </div>
  </>;
}

// ─── Jours Fériés (Admin) ─────────────────────────────────────────────────────
// feriesOverrides : { "2026-04-06": { label:"Lundi de Pâques", newDate:"2026-04-07" } }
// feriesManuels   : { "2026-05-20": "Pont entreprise" }
function JoursFeries({ feriesManuels, feriesOverrides, onAdd, onDelete, onOverride, onDeleteOverride }) {
  const [annee, setAnnee] = useState(new Date().getFullYear());
  const [formSpecial, setFormSpecial] = useState({ date:"", label:"" });
  const [editModal, setEditModal] = useState(null); // { origDate, label, newDate }
  const [err, setErr] = useState("");
  const [errEdit, setErrEdit] = useState("");

  const feriesAutoBase = getFeriesAuto(annee);
  // Applique les overrides : on remplace la date calculée par la date corrigée
  const feriesAutoEffectifs = useMemo(() => {
    const result = {};
    Object.entries(feriesAutoBase).forEach(([d, label]) => {
      const ov = feriesOverrides[d];
      if (ov) {
        // La date est déplacée : on l'inscrit à la nouvelle date, on marque l'original comme surchargé
        result[ov.newDate] = { label, origDate: d, isOverridden: true };
      } else {
        result[d] = { label, origDate: d, isOverridden: false };
      }
    });
    return result;
  }, [feriesAutoBase, feriesOverrides]);

  const feriesSpeciaux = Object.entries(feriesManuels).filter(([d]) => d.startsWith(String(annee)));

  const submitSpecial = () => {
    if (!formSpecial.date || !formSpecial.label.trim()) return setErr("Date et libellé requis.");
    // Vérifie conflit avec fériés effectifs
    const conflict = Object.entries(feriesAutoEffectifs).find(([d]) => d === formSpecial.date);
    if (conflict) return setErr(`Cette date est déjà occupée par "${conflict[1].label}".`);
    onAdd(formSpecial.date, formSpecial.label.trim());
    setFormSpecial({ date:"", label:"" });
    setErr("");
  };

  const openEdit = (effectiveDate, info) => {
    setErrEdit("");
    setEditModal({ origDate: info.origDate, effectiveDate, label: info.label, newDate: effectiveDate });
  };

  const submitEdit = () => {
    if (!editModal.newDate) return setErrEdit("Date requise.");
    if (editModal.newDate === editModal.origDate) {
      // Réinitialisation : on supprime l'override s'il existe
      onDeleteOverride(editModal.origDate);
    } else {
      // Conflit avec un autre férié ?
      const conflict = Object.entries(feriesAutoEffectifs).find(([d,v]) => d === editModal.newDate && v.origDate !== editModal.origDate);
      const conflictSpecial = feriesManuels[editModal.newDate];
      if (conflict) return setErrEdit(`Cette date est déjà occupée par "${conflict[1].label}".`);
      if (conflictSpecial) return setErrEdit(`Cette date est déjà un jour spécial ("${conflictSpecial}").`);
      onOverride(editModal.origDate, editModal.newDate);
    }
    setEditModal(null);
  };

  // Date calculée originale formatée en français
  const fmtDate = (ds) => {
    const [y,m,d] = ds.split("-");
    return `${d}/${m}/${y}`;
  };

  return <>
    <div className="page-header"><div>
      <div className="page-title">Gestion des jours fériés 🗓️</div>
      <div className="page-sub">Calendrier officiel France — correction et jours spéciaux</div>
    </div></div>
    <div className="page-body">
      <div className="month-selector" style={{marginBottom:18}}>
        <label style={{fontSize:13,fontWeight:500}}>Année :</label>
        <select value={annee} onChange={e=>setAnnee(parseInt(e.target.value))}>
          {[2025,2026,2027,2028,2029].map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,alignItems:"start"}}>

        {/* ── Fériés calculés ── */}
        <div className="card">
          <div className="card-title">🇫🇷 Jours fériés officiels {annee}</div>
          <div className="info-box info-blue" style={{marginBottom:12,fontSize:12}}>
            Calculés automatiquement (algorithme officiel). Cliquez sur ✏️ pour corriger une date si elle est décalée.
          </div>
          <div className="table-wrap"><table>
            <thead><tr>
              <th>Date effective</th>
              <th>Férié</th>
              <th>Statut</th>
              <th></th>
            </tr></thead>
            <tbody>{Object.entries(feriesAutoEffectifs).sort((a,b)=>a[0].localeCompare(b[0])).map(([d, info]) => (
              <tr key={info.origDate}>
                <td style={{whiteSpace:"nowrap",fontWeight:600}}>{fmtDate(d)}</td>
                <td>{info.label}</td>
                <td>
                  {info.isOverridden
                    ? <span className="badge" style={{color:"#d97706",background:"#fef3c7"}}>✏️ Corrigé</span>
                    : <span className="badge" style={{color:"var(--accent2)",background:"#d1fae5"}}>✓ Auto</span>
                  }
                  {info.isOverridden && (
                    <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>
                      Calculé : {fmtDate(info.origDate)}
                    </div>
                  )}
                </td>
                <td>
                  <div className="actions-row">
                    <button className="btn btn-orange btn-sm" onClick={()=>openEdit(d, info)} title="Corriger la date">✏️</button>
                    {info.isOverridden && (
                      <button className="btn btn-ghost btn-sm" onClick={()=>onDeleteOverride(info.origDate)} title="Rétablir la date calculée">↩</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>

        {/* ── Jours spéciaux manuels ── */}
        <div>
          <div className="card" style={{marginBottom:14}}>
            <div className="card-title">➕ Ajouter un jour spécial</div>
            <div className="info-box info-purple" style={{marginBottom:10,fontSize:12}}>
              Ponts, journées entreprise, jours supplémentaires non officiel…
            </div>
            {err && <div className="info-box info-warn" style={{marginBottom:10}}>{err}</div>}
            <div className="form-grid">
              <div className="form-group"><label>Date</label>
                <input type="date" value={formSpecial.date} onChange={e=>setFormSpecial({...formSpecial,date:e.target.value})} /></div>
              <div className="form-group"><label>Libellé</label>
                <input type="text" value={formSpecial.label} onChange={e=>setFormSpecial({...formSpecial,label:e.target.value})} placeholder="Ex: Pont entreprise" /></div>
            </div>
            <div className="form-actions">
              <button className="btn btn-primary" onClick={submitSpecial} disabled={!formSpecial.date||!formSpecial.label}>Ajouter</button>
            </div>
          </div>

          <div className="card">
            <div className="card-title">📌 Jours spéciaux ({annee}) — {feriesSpeciaux.length} saisi(s)</div>
            {feriesSpeciaux.length===0
              ? <div className="empty-state" style={{padding:"18px"}}><p>Aucun jour spécial pour {annee}.</p></div>
              : <div className="table-wrap"><table>
                  <thead><tr><th>Date</th><th>Libellé</th><th></th></tr></thead>
                  <tbody>{feriesSpeciaux.sort().map(([d,n])=>(
                    <tr key={d}>
                      <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{fmtDate(d)}</td>
                      <td>{n}</td>
                      <td><button className="btn btn-danger btn-sm" onClick={()=>onDelete(d)}>Supprimer</button></td>
                    </tr>
                  ))}</tbody>
                </table></div>
            }
          </div>
        </div>
      </div>
    </div>

    {/* Modal correction date calculée */}
    {editModal && (
      <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditModal(null)}>
        <div className="modal" style={{maxWidth:460}}>
          <div className="modal-header">
            <div className="modal-title">Corriger la date — {editModal.label}</div>
            <button className="modal-close" onClick={()=>setEditModal(null)}>×</button>
          </div>
          <div className="info-box info-yellow" style={{marginBottom:14}}>
            Date calculée automatiquement : <strong>{fmtDate(editModal.origDate)}</strong><br/>
            Si cette date est incorrecte dans votre contexte, corrigez-la ci-dessous.
          </div>
          {errEdit && <div className="info-box info-warn" style={{marginBottom:10}}>{errEdit}</div>}
          <div className="form-group">
            <label>Date corrigée pour {editModal.label}</label>
            <input type="date" value={editModal.newDate}
              onChange={e=>setEditModal({...editModal,newDate:e.target.value})} />
          </div>
          <div className="info-box info-blue" style={{marginTop:10,fontSize:12}}>
            ℹ Cette correction ne s'applique qu'à l'année {annee}. La date calculée reste visible pour référence.
          </div>
          <div className="form-actions" style={{marginTop:16}}>
            <button className="btn btn-primary" onClick={submitEdit}>Enregistrer la correction</button>
            {editModal.effectiveDate !== editModal.origDate && (
              <button className="btn btn-ghost" onClick={()=>{onDeleteOverride(editModal.origDate);setEditModal(null);}}>
                ↩ Rétablir la date calculée
              </button>
            )}
            <button className="btn btn-ghost" onClick={()=>setEditModal(null)}>Annuler</button>
          </div>
        </div>
      </div>
    )}
  </>;
}

// ─── Nouvelle Demande ─────────────────────────────────────────────────────────
function NouvelleDemande({ user, onSubmit, feriesAll }) {
  const [form, setForm] = useState({debut:"",fin:"",type:"Congés payés",motif:""});
  const [done, setDone] = useState(false);
  const jours = form.debut&&form.fin ? joursOuvres(form.debut,form.fin,feriesAll) : 0;
  const solde = form.type==="RTT" ? user.soldeRTT : user.solde;
  const soldeApres = solde-jours;
  const submit = () => { if (!form.debut||!form.fin||jours<=0) return; onSubmit({...form,jours,salarie:user.nom,salarieId:user.id}); setDone(true); };
  if (done) return <>
    <div className="page-header"><div className="page-title">Nouvelle demande</div></div>
    <div className="page-body"><div className="card" style={{textAlign:"center",padding:"40px"}}>
      <div style={{fontSize:40,marginBottom:11}}>✅</div>
      <h2 style={{fontFamily:"'DM Serif Display',serif",marginBottom:7}}>Demande envoyée !</h2>
      <p style={{color:"var(--muted)",marginBottom:20}}>Votre manager sera notifié prochainement.</p>
      <button className="btn btn-ghost" onClick={()=>setDone(false)}>Faire une autre demande</button>
    </div></div>
  </>;
  return <>
    <div className="page-header"><div><div className="page-title">Nouvelle demande</div><div className="page-sub">Soumettez une demande de congé</div></div></div>
    <div className="page-body"><div className="card">
      <div className="form-grid">
        <div className="form-group"><label>Début</label><input type="date" value={form.debut} onChange={e=>setForm({...form,debut:e.target.value})} /></div>
        <div className="form-group"><label>Fin</label><input type="date" value={form.fin} min={form.debut} onChange={e=>setForm({...form,fin:e.target.value})} /></div>
        <div className="form-group"><label>Type</label>
          <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
            <option>Congés payés</option><option>RTT</option><option>Congé sans solde</option><option>Congé exceptionnel</option>
          </select></div>
        <div className="form-group"><label>Durée (jours ouvrés hors fériés)</label><input readOnly value={jours>0?`${jours} jour(s)`:"—"} /></div>
        <div className="form-group full"><label>Motif</label><textarea value={form.motif} onChange={e=>setForm({...form,motif:e.target.value})} placeholder="Optionnel…" /></div>
      </div>
      {jours>0&&<div className={`info-box ${soldeApres>=0?"info-ok":"info-warn"}`} style={{marginTop:12}}>
        {soldeApres>=0?`✅ Solde après demande : ${soldeApres} j`:`⚠ Solde insuffisant — il manque ${Math.abs(soldeApres)} j`}
      </div>}
      <div className="form-actions"><button className="btn btn-primary" onClick={submit} disabled={jours<=0||soldeApres<0}>Envoyer →</button></div>
    </div></div>
  </>;
}

// ─── Validation ───────────────────────────────────────────────────────────────
function Validation({ demandes, users, onValider, onRefuser, onAnnuler, onSaisirPourSalarie, feriesAll, managerUser }) {
  const enAttente  = demandes.filter(d=>d.statut==="en_attente").sort((a,b)=>new Date(a.date_demande)-new Date(b.date_demande));
  const approuvees = demandes.filter(d=>d.statut==="approuve").sort((a,b)=>new Date(b.debut)-new Date(a.debut));
  const [tab, setTab] = useState("attente");

  // Saisie manager : salariés rattachés à ce manager
  const mesSalaries = users.filter(u=>u.role==="salarie"&&u.managerId===managerUser.id);
  const [form, setForm] = useState({salarieId:"",debut:"",fin:"",type:"Congés payés",motif:""});
  const [formErr, setFormErr] = useState("");
  const [done, setDone] = useState(false);

  const salChoisi = mesSalaries.find(u=>u.id===parseInt(form.salarieId));
  const jours = form.debut&&form.fin ? joursOuvres(form.debut,form.fin,feriesAll) : 0;
  const solde = salChoisi ? (form.type==="RTT" ? salChoisi.soldeRTT : salChoisi.solde) : 0;
  const soldeApres = solde - jours;

  const submitSaisie = () => {
    if (!form.salarieId) return setFormErr("Veuillez choisir un salarié.");
    if (!form.debut||!form.fin||jours<=0) return setFormErr("Dates invalides.");
    if (soldeApres < 0) return setFormErr(`Solde insuffisant — il manque ${Math.abs(soldeApres)} jour(s).`);
    onSaisirPourSalarie({
      salarieId: parseInt(form.salarieId),
      salarie: salChoisi.nom,
      debut: form.debut, fin: form.fin,
      jours, type: form.type, motif: form.motif,
    });
    setForm({salarieId:"",debut:"",fin:"",type:"Congés payés",motif:""});
    setFormErr(""); setDone(true);
    setTimeout(()=>setDone(false), 3000);
  };

  return <>
    <div className="page-header"><div><div className="page-title">Validation congés</div><div className="page-sub">{enAttente.length} en attente</div></div></div>
    <div className="page-body">
      <div className="tabs">
        <button className={`tab ${tab==="attente"?"active":""}`}   onClick={()=>setTab("attente")}>⏳ En attente ({enAttente.length})</button>
        <button className={`tab ${tab==="approuvees"?"active":""}`} onClick={()=>setTab("approuvees")}>✅ Approuvés ({approuvees.length})</button>
        <button className={`tab ${tab==="saisie"?"active":""}`}     onClick={()=>setTab("saisie")}>✏️ Saisir pour un salarié</button>
      </div>

      {/* ── En attente ── */}
      {tab==="attente"&&(enAttente.length===0
        ? <div className="card"><div className="empty-state"><div className="empty-icon">🎉</div><p>Tout est traité !</p></div></div>
        : <div className="table-wrap"><table>
            <thead><tr><th>Salarié</th><th>Type</th><th>Période</th><th>Durée</th><th>Motif</th><th>Actions</th></tr></thead>
            <tbody>{enAttente.map(d=>(
              <tr key={d.id}>
                <td><strong>{d.salarie}</strong></td><td>{d.type}</td>
                <td style={{whiteSpace:"nowrap"}}>{d.debut} → {d.fin}</td><td>{d.jours}j</td>
                <td style={{color:"var(--muted)",fontSize:11}}>{d.motif||"—"}</td>
                <td><div className="actions-row">
                  <button className="btn btn-success btn-sm" onClick={()=>onValider(d.id)}>✓ Approuver</button>
                  <button className="btn btn-danger btn-sm"  onClick={()=>onRefuser(d.id)}>✗ Refuser</button>
                </div></td>
              </tr>
            ))}</tbody>
          </table></div>
      )}

      {/* ── Approuvés ── */}
      {tab==="approuvees"&&(<>
        <div className="info-box info-yellow" style={{marginBottom:12}}>⚠ Annuler recrédite automatiquement les jours sur le solde du salarié.</div>
        {approuvees.length===0
          ? <div className="empty-state"><div className="empty-icon">📋</div><p>Aucun congé approuvé.</p></div>
          : <div className="table-wrap"><table>
              <thead><tr><th>Salarié</th><th>Type</th><th>Période</th><th>Durée</th><th></th></tr></thead>
              <tbody>{approuvees.map(d=>(
                <tr key={d.id}>
                  <td><strong>{d.salarie}</strong></td><td>{d.type}</td>
                  <td style={{whiteSpace:"nowrap"}}>{d.debut} → {d.fin}</td><td>{d.jours}j</td>
                  <td><button className="btn btn-orange btn-sm" onClick={()=>onAnnuler(d.id)}>↩ Annuler</button></td>
                </tr>
              ))}</tbody>
            </table></div>
        }
      </>)}

      {/* ── Saisie manager ── */}
      {tab==="saisie"&&(
        <div className="card">
          <div className="card-title">✏️ Saisir un congé directement pour un salarié</div>
          <div className="info-box info-blue" style={{marginBottom:16}}>
            La demande sera créée avec le statut <strong>En attente</strong>. Elle apparaîtra en hachuré sur le planning et vous pourrez ensuite la valider ou la refuser depuis l'onglet "En attente".
          </div>
          {done && <div className="info-box info-ok" style={{marginBottom:14}}>✅ Demande créée — retrouvez-la dans l'onglet "En attente" pour la valider.</div>}
          {formErr && <div className="info-box info-warn" style={{marginBottom:14}}>{formErr}</div>}
          {mesSalaries.length===0
            ? <div className="empty-state"><div className="empty-icon">👥</div><p>Aucun salarié rattaché à votre compte.</p></div>
            : <>
              <div className="form-grid">
                <div className="form-group"><label>Salarié</label>
                  <select value={form.salarieId} onChange={e=>setForm({...form,salarieId:e.target.value})}>
                    <option value="">— Choisir un salarié —</option>
                    {mesSalaries.map(u=>(
                      <option key={u.id} value={u.id}>{u.nom} (CP : {u.solde}j · RTT : {u.soldeRTT}j)</option>
                    ))}
                  </select>
                </div>
                <div className="form-group"><label>Type de congé</label>
                  <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                    <option>Congés payés</option>
                    <option>RTT</option>
                    <option>Congé sans solde</option>
                    <option>Congé exceptionnel</option>
                  </select>
                </div>
                <div className="form-group"><label>Date de début</label>
                  <input type="date" value={form.debut} onChange={e=>setForm({...form,debut:e.target.value})} />
                </div>
                <div className="form-group"><label>Date de fin</label>
                  <input type="date" value={form.fin} min={form.debut} onChange={e=>setForm({...form,fin:e.target.value})} />
                </div>
                <div className="form-group"><label>Durée (jours ouvrés hors fériés)</label>
                  <input readOnly value={jours>0?`${jours} jour(s)`:"—"} />
                </div>
                <div className="form-group"><label>Motif</label>
                  <input type="text" value={form.motif} onChange={e=>setForm({...form,motif:e.target.value})} placeholder="Optionnel…" />
                </div>
              </div>

              {/* Aperçu solde */}
              {salChoisi && jours>0 && (
                <div className={`info-box ${soldeApres>=0?"info-ok":"info-warn"}`} style={{marginTop:14}}>
                  {soldeApres>=0
                    ? `✅ Solde de ${salChoisi.nom} après ce congé : ${soldeApres} jour(s)`
                    : `⚠ Solde insuffisant pour ${salChoisi.nom} — il manque ${Math.abs(soldeApres)} jour(s)`
                  }
                </div>
              )}

              <div className="form-actions" style={{marginTop:18}}>
                <button className="btn btn-primary" onClick={submitSaisie} disabled={!form.salarieId||jours<=0||soldeApres<0}>
                  📋 Créer la demande (en attente)
                </button>
              </div>
            </>
          }
        </div>
      )}
    </div>
  </>;
}

          <div className="form-group"><label>Heures</label><input type="number" step="0.5" min="0.5" max="60" value={form.heures} onChange={e=>setForm({...form,heures:e.target.value})} placeholder="Ex: 3.5" /></div>
          <div className="form-group"><label>Commentaire</label><input type="text" value={form.commentaire} onChange={e=>setForm({...form,commentaire:e.target.value})} /></div>
        </div>
        <div className="form-actions">
          <button className="btn btn-primary" onClick={submit} disabled={!form.salarieId||!form.heures||!form.semaine}>Enregistrer</button>
          <button className="btn btn-ghost" onClick={()=>setModal(false)}>Annuler</button>
        </div>
      </div>
    </div>}
  </>;
}

// ─── Préparation Paie ─────────────────────────────────────────────────────────
function PreparationPaie({ demandes, absences, heuresSup, users }) {
  const [mois, setMois] = useState(new Date().getMonth());
  const [annee, setAnnee] = useState(new Date().getFullYear());
  const [expanded, setExpanded] = useState({});
  const salaries = users.filter(u=>u.role==="salarie");
  const recap = useMemo(()=>salaries.map(sal=>{
    const congesMois=demandes.filter(d=>d.salarieId===sal.id&&d.statut==="approuve"&&new Date(d.debut).getMonth()===mois&&new Date(d.debut).getFullYear()===annee);
    const absencesMois=absences.filter(a=>a.salarieId===sal.id&&a.mois===mois&&a.annee===annee);
    const heuresMois=heuresSup.filter(h=>h.salarieId===sal.id&&h.mois===mois&&h.annee===annee);
    const totalConges=congesMois.reduce((s,d)=>s+d.jours,0);
    const totalAbsences=absencesMois.reduce((s,a)=>s+a.jours,0);
    const totalHeures=heuresMois.reduce((s,h)=>s+h.heures,0);
    const absParType={};
    ABSENCE_TYPES.forEach(t=>{const n=absencesMois.filter(a=>a.type===t.id).reduce((s,a)=>s+a.jours,0);if(n>0)absParType[t.id]=n;});
    return {sal,congesMois,absencesMois,heuresMois,totalConges,totalAbsences,totalHeures,absParType};
  }),[mois,annee,demandes,absences,heuresSup,users]);
  const totals=recap.reduce((s,r)=>({c:s.c+r.totalConges,a:s.a+r.totalAbsences,h:s.h+r.totalHeures}),{c:0,a:0,h:0});
  const handleCSV=()=>{
    const rows=[["Salarié","CP (j)","RTT (j)","Maladie (j)","Abs. injustifiée (j)","Acc. travail (j)","Enfant malade (j)","CSS (j)","Total absences (j)","Heures sup (h)"]];
    recap.forEach(r=>{rows.push([r.sal.nom,
      r.congesMois.filter(d=>d.type==="Congés payés").reduce((s,d)=>s+d.jours,0),
      r.congesMois.filter(d=>d.type==="RTT").reduce((s,d)=>s+d.jours,0),
      r.absParType["maladie"]||0,r.absParType["absence_injustifiee"]||0,
      r.absParType["accident_travail"]||0,r.absParType["enfant_malade"]||0,
      r.absParType["conge_sans_solde"]||0,r.totalAbsences,r.totalHeures]);});
    exportCSV(rows,`paie_${MONTHS[mois]}_${annee}.csv`);
  };
  return <>
    <div className="page-header">
      <div><div className="page-title">Préparation paie 💶</div><div className="page-sub">Récapitulatif mensuel</div></div>
      <div className="actions-row">
        <div className="month-selector">
          <select value={mois} onChange={e=>setMois(parseInt(e.target.value))}>{MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
          <select value={annee} onChange={e=>setAnnee(parseInt(e.target.value))}>{[2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}</select>
        </div>
        <button className="btn btn-blue" onClick={handleCSV}>⬇ Export CSV</button>
      </div>
    </div>
    <div className="page-body">
      <div className="paie-grid">
        <div className="paie-stat"><div className="paie-stat-val" style={{color:"var(--accent2)"}}>{totals.c}</div><div className="paie-stat-lbl">Jours congés posés</div></div>
        <div className="paie-stat"><div className="paie-stat-val" style={{color:"var(--accent)"}}>{totals.a}</div><div className="paie-stat-lbl">Jours d'absence</div></div>
        <div className="paie-stat"><div className="paie-stat-val" style={{color:"#2563eb"}}>{totals.h}h</div><div className="paie-stat-lbl">Heures supplémentaires</div></div>
      </div>
      {recap.map(r=>{
        const isOpen=expanded[r.sal.id]; const hasData=r.totalConges>0||r.totalAbsences>0||r.totalHeures>0;
        return <div className="sal-recap" key={r.sal.id} style={{opacity:hasData?1:.6}}>
          <div className="recap-header" onClick={()=>setExpanded(e=>({...e,[r.sal.id]:!e[r.sal.id]}))}>
            <div className="recap-name">{r.sal.nom}</div>
            <div className="recap-pills">
              {r.totalConges>0&&<span className="badge" style={{color:"var(--accent2)",background:"#d1fae5"}}>🌴 {r.totalConges}j</span>}
              {r.totalAbsences>0&&<span className="badge" style={{color:"var(--accent)",background:"#fee2e2"}}>🏥 {r.totalAbsences}j</span>}
              {r.totalHeures>0&&<span className="badge" style={{color:"#2563eb",background:"#dbeafe"}}>⏱ {r.totalHeures}h</span>}
              {!hasData&&<span style={{fontSize:11,color:"var(--muted)"}}>Aucun événement</span>}
              <span style={{color:"var(--muted)",fontSize:15}}>{isOpen?"▲":"▼"}</span>
            </div>
          </div>
          {isOpen&&<div className="recap-body">
            <div><div className="recap-item-label">Congés payés</div><div className="recap-item-val" style={{color:"var(--accent2)"}}>{r.congesMois.filter(d=>d.type==="Congés payés").reduce((s,d)=>s+d.jours,0)}j</div></div>
            <div><div className="recap-item-label">RTT</div><div className="recap-item-val" style={{color:"#7c3aed"}}>{r.congesMois.filter(d=>d.type==="RTT").reduce((s,d)=>s+d.jours,0)}j</div></div>
            <div><div className="recap-item-label">Heures sup.</div><div className="recap-item-val" style={{color:"#2563eb"}}>{r.totalHeures}h</div></div>
            {ABSENCE_TYPES.map(t=>{const jrs=r.absParType[t.id]||0;return(
              <div key={t.id}><div className="recap-item-label">{t.icon} {t.label}</div><div className="recap-item-val" style={{color:jrs>0?t.color:"var(--muted)"}}>{jrs}j</div></div>
            );})}
          </div>}
        </div>;
      })}
    </div>
  </>;
}

// ─── Gestion Employés ─────────────────────────────────────────────────────────
function GestionEmployes({ users, onAdd, onDelete, onUpdate }) {
  const [modal, setModal] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [form, setForm] = useState({nom:"",email:"",password:"",role:"salarie",isAdmin:false,managerId:"",solde:25,soldeRTT:5});
  const [formErr, setFormErr] = useState("");
  const managers = users.filter(u=>u.role==="manager");
  const adminManagers = users.filter(u=>u.isAdmin&&u.role==="manager");

  const openAdd = () => { setForm({nom:"",email:"",password:"",role:"salarie",isAdmin:false,managerId:managers[0]?.id||"",solde:25,soldeRTT:5}); setFormErr(""); setModal("add"); };
  const openEdit = (u) => { setForm({nom:u.nom,email:u.email,password:"",role:u.role,isAdmin:u.isAdmin,managerId:u.managerId||"",solde:u.solde,soldeRTT:u.soldeRTT}); setFormErr(""); setModal(u); };

  // Vérifie qu'il restera au moins un admin manager après suppression/modification
  const wouldRemoveLastAdmin = (userId, changes={}) => {
    const futureUsers = users.map(u=>u.id===userId?{...u,...changes}:u);
    return !futureUsers.some(u=>u.isAdmin&&u.role==="manager");
  };

  const submitAdd = () => {
    if (!form.nom.trim()||!form.email.trim()||!form.password.trim()) return setFormErr("Nom, email et mot de passe requis.");
    if (users.find(u=>u.email===form.email.trim())) return setFormErr("Email déjà utilisé.");
    if (form.password.length<4) return setFormErr("Mot de passe trop court (min 4 caractères).");
    if (form.isAdmin && form.role!=="manager") return setFormErr("Un administrateur doit obligatoirement être manager.");
    onAdd({...form,nom:form.nom.trim(),email:form.email.trim(),managerId:form.role==="salarie"?parseInt(form.managerId)||null:null,solde:parseInt(form.solde),soldeRTT:parseInt(form.soldeRTT),mustChangePassword:true});
    setModal(null);
  };

  const submitEdit = () => {
    if (!form.nom.trim()||!form.email.trim()) return setFormErr("Nom et email requis.");
    if (users.find(u=>u.email===form.email.trim()&&u.id!==modal.id)) return setFormErr("Email déjà utilisé.");
    if (form.isAdmin && form.role!=="manager") return setFormErr("Un administrateur doit être manager.");
    const changes={nom:form.nom.trim(),email:form.email.trim(),role:form.role,isAdmin:form.isAdmin,managerId:form.role==="salarie"?parseInt(form.managerId)||null:null,solde:parseInt(form.solde),soldeRTT:parseInt(form.soldeRTT)};
    if (form.password.trim()) changes.password=form.password.trim();
    // Vérifier qu'on ne retire pas le dernier admin
    if (modal.isAdmin && !form.isAdmin && wouldRemoveLastAdmin(modal.id,changes)) return setFormErr("Impossible : il doit toujours rester au moins un administrateur manager.");
    onUpdate(modal.id,changes);
    setModal(null);
  };

  const getRolePill = (u) => {
    if (u.isAdmin) return <span className="pill-admin">🛡️ Admin</span>;
    if (u.role==="manager") return <span className="pill-manager">👑 Manager</span>;
    return <span className="pill-salarie">Salarié</span>;
  };

  return <>
    <div className="page-header">
      <div><div className="page-title">Gestion employés ⚙️</div><div className="page-sub">{users.length} compte(s) · {adminManagers.length} admin(s)</div></div>
      <button className="btn btn-primary" onClick={openAdd}>+ Nouvel employé</button>
    </div>
    <div className="page-body">
      <div className="table-wrap"><table>
        <thead><tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Manager rattaché</th><th>CP</th><th>RTT</th><th>Statut</th><th>Actions</th></tr></thead>
        <tbody>{users.map(u=>{
          const mgr=managers.find(m=>m.id===u.managerId);
          const isProtected=u.isAdmin;
          return <tr key={u.id}>
            <td><strong>{u.nom}</strong>{u.isAdmin&&<span style={{fontSize:10,color:"#7c3aed",marginLeft:5}}>🛡️</span>}</td>
            <td style={{fontSize:11,color:"var(--muted)"}}>{u.email}</td>
            <td>{getRolePill(u)}</td>
            <td style={{fontSize:11}}>{mgr?mgr.nom:<span style={{color:"var(--muted)"}}>—</span>}</td>
            <td>{u.solde}j</td><td>{u.soldeRTT}j</td>
            <td>{u.mustChangePassword?<span className="badge" style={{color:"#d97706",background:"#fef3c7"}}>⚠ Temporaire</span>:<span className="badge" style={{color:"var(--accent2)",background:"#d1fae5"}}>✓ Actif</span>}</td>
            <td><div className="actions-row">
              <button className="btn btn-orange btn-sm" onClick={()=>openEdit(u)}>✏ Modifier</button>
              {!isProtected
                ? <button className="btn btn-danger btn-sm" onClick={()=>setConfirmDel(u)}>🗑 Suppr.</button>
                : <span className="badge" style={{color:"#7c3aed",background:"#f5f3ff",fontSize:10}}>🔒 Protégé</span>
              }
            </div></td>
          </tr>;
        })}</tbody>
      </table></div>
      <div className="info-box info-purple" style={{marginTop:12}}>🛡️ Les comptes administrateurs ne peuvent pas être supprimés. Il doit toujours exister au moins un administrateur manager.</div>
    </div>

    {modal&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">{modal==="add"?"Nouvel employé":"Modifier l'employé"}</div>
          <button className="modal-close" onClick={()=>setModal(null)}>×</button>
        </div>
        {formErr&&<div className="info-box info-warn" style={{marginBottom:12}}>{formErr}</div>}
        <div className="form-grid">
          <div className="form-group"><label>Nom complet</label><input type="text" value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})} placeholder="Prénom Nom" /></div>
          <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} /></div>
          <div className="form-group"><label>{modal==="add"?"Mot de passe initial":"Nouveau MDP (vide = inchangé)"}</label>
            <input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder={modal==="add"?"Temporaire…":"Laisser vide pour ne pas changer"} /></div>
          <div className="form-group"><label>Rôle</label>
            <select value={form.role} onChange={e=>setForm({...form,role:e.target.value,isAdmin:e.target.value==="salarie"?false:form.isAdmin})}>
              <option value="salarie">Salarié</option>
              <option value="manager">Manager</option>
            </select></div>
          {form.role==="manager"&&(
            <div className="form-group full">
              <label className="checkbox-row">
                <input type="checkbox" checked={form.isAdmin} onChange={e=>setForm({...form,isAdmin:e.target.checked})} />
                Accorder les droits Administrateur à ce manager
              </label>
              {form.isAdmin&&<div className="info-box info-purple" style={{marginTop:6}}>🛡️ L'admin peut gérer tous les employés, les jours fériés et ne peut pas être supprimé.</div>}
            </div>
          )}
          {form.role==="salarie"&&(
            <div className="form-group"><label>Manager rattaché</label>
              <select value={form.managerId} onChange={e=>setForm({...form,managerId:e.target.value})}>
                <option value="">— Aucun —</option>
                {managers.map(m=><option key={m.id} value={m.id}>{m.nom}</option>)}
              </select></div>
          )}
          <div className="form-group"><label>Solde CP (jours)</label><input type="number" min="0" max="99" value={form.solde} onChange={e=>setForm({...form,solde:e.target.value})} /></div>
          <div className="form-group"><label>Solde RTT (jours)</label><input type="number" min="0" max="99" value={form.soldeRTT} onChange={e=>setForm({...form,soldeRTT:e.target.value})} /></div>
        </div>
        {modal==="add"&&<div className="info-box info-blue" style={{marginTop:10}}>ℹ L'employé devra changer son mot de passe à la 1ère connexion.</div>}
        <div className="form-actions">
          <button className="btn btn-primary" onClick={modal==="add"?submitAdd:submitEdit}>{modal==="add"?"Créer le compte":"Enregistrer"}</button>
          <button className="btn btn-ghost" onClick={()=>setModal(null)}>Annuler</button>
        </div>
      </div>
    </div>}

    {confirmDel&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setConfirmDel(null)}>
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-header"><div className="modal-title">Supprimer un employé</div><button className="modal-close" onClick={()=>setConfirmDel(null)}>×</button></div>
        <p style={{fontSize:13.5,color:"var(--muted)",marginBottom:14}}>Confirmer la suppression de <strong style={{color:"var(--ink)"}}>{confirmDel.nom}</strong> ? Action irréversible.</p>
        <div className="form-actions">
          <button className="btn btn-danger" onClick={()=>{onDelete(confirmDel.id);setConfirmDel(null);}}>Supprimer définitivement</button>
          <button className="btn btn-ghost" onClick={()=>setConfirmDel(null)}>Annuler</button>
        </div>
      </div>
    </div>}
  </>;
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function App() {
  const [users, setUsers] = useState(INIT_USERS);
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [demandes, setDemandes] = useState(INIT_DEMANDES);
  const [absences, setAbsences] = useState(INIT_ABSENCES);
  const [heuresSup, setHeuresSup] = useState(INIT_HEURES_SUP);
  const [feriesManuels, setFeriesManuels] = useState(INIT_FERIES_MANUELS);
  // feriesOverrides : { "origDate_YYYY-MM-DD": { newDate: "YYYY-MM-DD" } }
  // Permet à l'admin de corriger la date calculée d'un férié auto
  const [feriesOverrides, setFeriesOverrides] = useState({});
  const [toast, setToast] = useState(null);

  const toast$ = msg => { setToast(msg); setTimeout(()=>setToast(null), 3200); };

  const syncUser = (updatedUsers, uid) => {
    const fresh = updatedUsers.find(u=>u.id===uid);
    if (fresh) setUser(fresh);
  };

  // Construit la map complète des fériés effectifs pour le calcul des jours ouvrés
  // Pour chaque année couverte, applique les overrides puis fusionne manuels
  const feriesAll = useMemo(() => {
    const years = [-1, 0, 1, 2].map(d => new Date().getFullYear() + d);
    const result = {};
    years.forEach(y => {
      const base = getFeriesAuto(y);
      Object.entries(base).forEach(([origDate, label]) => {
        const ov = feriesOverrides[origDate];
        const effectiveDate = ov ? ov.newDate : origDate;
        result[effectiveDate] = label;
      });
    });
    // Ajoute les jours spéciaux manuels
    Object.entries(feriesManuels).forEach(([d, label]) => { result[d] = label; });
    return result;
  }, [feriesManuels, feriesOverrides]);

  const handleLogin = (u) => { setUser(u); setPage("dashboard"); };
  const handleChangePwd = (pwd) => {
    const updated=users.map(u=>u.id===user.id?{...u,password:pwd,mustChangePassword:false}:u);
    setUsers(updated); setUser({...user,password:pwd,mustChangePassword:false}); toast$("✅ Mot de passe mis à jour !");
  };

  const handleNouvelleDemande = (d) => {
    setDemandes(p=>[{...d,id:genId(),statut:"en_attente",date_demande:new Date().toISOString().split("T")[0]},...p]);
    toast$("✅ Demande envoyée !"); setPage("historique");
  };
  const handleEditDemande = (id,c) => { setDemandes(p=>p.map(d=>d.id===id?{...d,...c}:d)); toast$("✅ Demande modifiée"); };
  const handleDeleteDemande = (id) => { setDemandes(p=>p.filter(d=>d.id!==id)); toast$("🗑 Demande supprimée"); };
  const handleValider = (id) => { setDemandes(p=>p.map(d=>d.id===id?{...d,statut:"approuve"}:d)); toast$("✅ Congé approuvé"); };
  const handleRefuser = (id) => { setDemandes(p=>p.map(d=>d.id===id?{...d,statut:"refuse"}:d)); toast$("✗ Congé refusé"); };
  const handleAnnuler = (id) => {
    const d=demandes.find(x=>x.id===id); if (!d) return;
    const field=d.type==="RTT"?"soldeRTT":"solde";
    const updated=users.map(u=>u.id===d.salarieId?{...u,[field]:u[field]+d.jours}:u);
    setUsers(updated); setDemandes(p=>p.map(x=>x.id===id?{...x,statut:"annule"}:x));
    if (user&&user.id===d.salarieId) syncUser(updated,d.salarieId);
    toast$(`↩ Annulé — ${d.jours}j recrédités à ${d.salarie}`);
  };
  const handleSaisirPourSalarie = (d) => {
    // Crée la demande en attente — le solde sera débité seulement à la validation
    setDemandes(p=>[{...d, id:genId(), statut:"en_attente", date_demande:new Date().toISOString().split("T")[0], saisiParManager:true},...p]);
    toast$(`📋 Demande créée pour ${d.salarie} — en attente de validation`);
  };

  const handleAddAbsence = (a) => { setAbsences(p=>[{...a,id:genId()},...p]); toast$("✅ Absence enregistrée"); };
  const handleDeleteAbsence = (id) => { setAbsences(p=>p.filter(a=>a.id!==id)); toast$("🗑 Absence supprimée"); };
  const handleAddHSup = (h) => { setHeuresSup(p=>[{...h,id:genId()},...p]); toast$("✅ Heures enregistrées"); };
  const handleDeleteHSup = (id) => { setHeuresSup(p=>p.filter(h=>h.id!==id)); toast$("🗑 Supprimé"); };

  const handleAddUser = (data) => { setUsers(p=>[...p,{...data,id:genId()}]); toast$(`✅ Compte créé pour ${data.nom}`); };
  const handleDeleteUser = (id) => { setUsers(p=>p.filter(u=>u.id!==id)); toast$("🗑 Employé supprimé"); };
  const handleUpdateUser = (id,c) => {
    const updated=users.map(u=>u.id===id?{...u,...c}:u);
    setUsers(updated); if (user&&user.id===id) syncUser(updated,id); toast$("✅ Employé mis à jour");
  };

  const handleAddFerie = (date,label) => { setFeriesManuels(f=>({...f,[date]:label})); toast$(`✅ Jour spécial ajouté : ${label}`); };
  const handleDeleteFerie = (date) => { setFeriesManuels(f=>{ const n={...f}; delete n[date]; return n; }); toast$("🗑 Jour spécial supprimé"); };

  // Override d'une date calculée : origDate → newDate
  const handleOverrideFerie = (origDate, newDate) => {
    setFeriesOverrides(ov => ({...ov, [origDate]: { newDate }}));
    toast$("✅ Date corrigée");
  };
  const handleDeleteOverride = (origDate) => {
    setFeriesOverrides(ov => { const n={...ov}; delete n[origDate]; return n; });
    toast$("↩ Date rétablie (calcul automatique)");
  };

  const pages = user ? {
    dashboard:  <Dashboard user={user} demandes={demandes} />,
    demande:    <NouvelleDemande user={user} onSubmit={handleNouvelleDemande} feriesAll={feriesAll} />,
    historique: <Historique user={user} demandes={demandes} onEdit={handleEditDemande} onDelete={handleDeleteDemande} feriesAll={feriesAll} />,
    planning:   <Planning users={users} demandes={demandes} absences={absences} feriesAll={feriesAll} />,
    validation: <Validation demandes={demandes} users={users} onValider={handleValider} onRefuser={handleRefuser} onAnnuler={handleAnnuler} onSaisirPourSalarie={handleSaisirPourSalarie} feriesAll={feriesAll} managerUser={user} />,
    absences:   <SaisieAbsences absences={absences} users={users} onAdd={handleAddAbsence} onDelete={handleDeleteAbsence} />,
    heures_sup: <HeuresSup heuresSup={heuresSup} users={users} onAdd={handleAddHSup} onDelete={handleDeleteHSup} />,
    paie:       <PreparationPaie demandes={demandes} absences={absences} heuresSup={heuresSup} users={users} />,
    equipe:     <Equipe users={users} demandes={demandes} absences={absences} />,
    employes:   <GestionEmployes users={users} onAdd={handleAddUser} onDelete={handleDeleteUser} onUpdate={handleUpdateUser} />,
    feries:     <JoursFeries feriesManuels={feriesManuels} feriesOverrides={feriesOverrides}
                  onAdd={handleAddFerie} onDelete={handleDeleteFerie}
                  onOverride={handleOverrideFerie} onDeleteOverride={handleDeleteOverride} />,
  } : {};

  if (!user) return <><style>{css}</style><LoginScreen users={users} onLogin={handleLogin} /></>;
  if (user.mustChangePassword) return <><style>{css}</style><ChangePasswordScreen onDone={handleChangePwd} /></>;

  return <>
    <style>{css}</style>
    <Shell user={user} page={page} setPage={setPage} onLogout={()=>setUser(null)}>
      {pages[page]||pages.dashboard}
    </Shell>
    {toast&&<div className="toast">{toast}</div>}
  </>;
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
